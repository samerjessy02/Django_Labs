<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Food & Drinks</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #F3F4F6;
            font-family: 'Poppins', sans-serif;
        }

        /* Hero Search Bar */
        .hero-search {
            background: linear-gradient(135deg, #FFE5EC, #FFF1E0);
            padding: 60px 30px;
            border-radius: 25px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
            margin-bottom: 50px;
        }

        .hero-search .form-control {
            border-radius: 50px;
            padding: 20px 25px;
            font-size: 1.1rem;
            border: none;
        }

        .hero-search .form-select {
            border-radius: 50px;
            padding: 0.6rem 1rem;
        }

        .hero-search .btn-search {
            border-radius: 50px;
            padding: 12px 25px;
            background-color: #FF6B81;
            border: none;
            font-weight: 600;
        }

        .hero-search .btn-search:hover {
            background-color: #FF4757;
        }

        /* Items Masonry Grid */
        .items-grid {
            column-count: 3;
            column-gap: 1.5rem;
        }

        @media (max-width: 992px) {
            .items-grid {
                column-count: 2;
            }
        }

        @media (max-width: 576px) {
            .items-grid {
                column-count: 1;
            }
        }

        /* Item Card */
        .item-card {
            background-color: #fff;
            margin-bottom: 1.5rem;
            border-radius: 20px;
            overflow: hidden;
            display: inline-block;
            width: 100%;
            position: relative;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .item-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.15);
        }

        .item-card img {
            width: 100%;
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
        }

        .card-body {
            padding: 20px;
            text-align: center;
        }

        .card-title {
            font-weight: 700;
            font-size: 1.2rem;
            margin-bottom: 10px;
            color: #333;
        }

        .price {
            color: #FF6B81;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .badge-category {
            position: absolute;
            top: 15px;
            left: 15px;
            padding: 8px 12px;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #fff;
        }

        .badge-food {
            background-color: #1DD1A1;
        }

        .badge-drink {
            background-color: #54A0FF;
        }

        .badge-available {
            background-color: #10AC84;
            padding: 5px 10px;
            font-size: 0.8rem;
            border-radius: 8px;
        }

        .badge-unavailable {
            background-color: #EE5253;
            padding: 5px 10px;
            font-size: 0.8rem;
            border-radius: 8px;
        }

        .no-results {
            margin-top: 80px;
            font-size: 1.4rem;
            color: #57606F;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="container py-5">

        <!-- Hero Search -->
        <div class="hero-search">
            <form method="GET" class="row g-3 justify-content-center align-items-center">
                <div class="col-md-6">
                    <input type="text" name="q" class="form-control"
                        placeholder="🔍 Search for food or drinks..."
                        value="{{ request.GET.q }}">
                </div>

                <div class="col-md-3">
                    <select name="category" class="form-select">
                        <option value="" disabled selected>All Categories</option>
                        <option value="food" {% if request.GET.category == "food" %}selected{% endif %}>
                            🍔 Food
                        </option>
                        <option value="drink" {% if request.GET.category == "drink" %}selected{% endif %}>
                            🥤 Drink
                        </option>
                    </select>
                </div>

                <div class="col-md-2 d-grid">
                    <button type="submit" class="btn btn-search">Search</button>
                </div>
            </form>
        </div>

        <!-- Items Masonry Grid -->
        <div class="items-grid">
            {% for item in items %}
            <div class="item-card">

                <!-- Optional Image -->
                <!-- <img src="https://via.placeholder.com/300x200" alt="{{ item.name }}"> -->

                <div class="card-body">
                    <h5 class="card-title">{{ item.name }}</h5>
                    <p class="price">{{ item.price }} EGP</p>

                    {% if item.available %}
                        <span class="badge badge-available">Available</span>
                    {% else %}
                        <span class="badge badge-unavailable">Not Available</span>
                    {% endif %}
                </div>

                {% if item.category == "food" %}
                    <span class="badge-category badge-food">🍔 Food</span>
                {% else %}
                    <span class="badge-category badge-drink">🥤 Drink</span>
                {% endif %}
            </div>

            {% empty %}
            <div class="no-results">
                <h5>No results found 😢</h5>
            </div>
            {% endfor %}
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
